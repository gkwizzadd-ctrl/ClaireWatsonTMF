<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Forum ODA — Benefits Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --tmf-blue:  #003087;
  --tmf-mid:   #0060B8;
  --tmf-light: #0080CC;
  --tmf-cyan:  #00B8D9;
  --claire:    #D91241;
  --ink:       #0D0B4D;
  --body:      #2C3148;
  --muted:     #6B7280;
  --rule:      #E2E6F0;
  --bg:        #F7F9FC;
  --white:     #FFFFFF;
  --serif:     'Cormorant Garamond', Georgia, serif;
  --sans:      'DM Sans', 'Segoe UI', sans-serif;
  --mono:      'DM Mono', 'Courier New', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: #C8CDD8; font-family: var(--sans); color: var(--body); }

/* ── Actions bar (not printed) ── */
#actions {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: var(--tmf-blue);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 54px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
#actions .atitle {
  color: rgba(255,255,255,0.85); font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%;
}
#actions .abtns { display: flex; gap: 10px; flex-shrink: 0; }
#actions button {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
  color: #fff; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 7px 18px; cursor: pointer;
  transition: background 0.18s;
}
#actions button:hover { background: rgba(255,255,255,0.2); }
#actions button.primary { background: var(--claire); border-color: var(--claire); }
#actions button.primary:hover { background: #b80f35; }

/* ── Email modal (not printed) ── */
#email-modal {
  position: fixed; inset: 0; z-index: 10000; background: rgba(5,3,20,0.72);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#email-modal.open { opacity: 1; pointer-events: all; }
.em-panel {
  background: #fff; width: 100%; max-width: 420px; border-radius: 10px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5); overflow: hidden;
  transform: scale(0.96) translateY(10px); transition: transform 0.25s cubic-bezier(.34,1.46,.64,1);
}
#email-modal.open .em-panel { transform: scale(1) translateY(0); }
.em-head { background: var(--tmf-blue); padding: 18px 24px; }
.em-head .eye { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
.em-head h3 { font-family: var(--serif); font-size: 19px; font-weight: 500; color: #fff; }
.em-body { padding: 22px 24px; }
.em-field { margin-bottom: 14px; }
.em-field label { display: block; font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.em-field input, .em-field textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--rule); border-radius: 6px;
  font-family: var(--sans); font-size: 13px; color: var(--body); outline: none; transition: border-color 0.15s;
}
.em-field input:focus, .em-field textarea:focus { border-color: var(--tmf-mid); }
.em-field textarea { resize: vertical; min-height: 60px; }
.em-status { font-family: var(--mono); font-size: 10px; margin-bottom: 10px; display: none; }
.em-status.ok { color: #1a8a3f; display: block; }
.em-status.err { color: var(--claire); display: block; }
.em-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 0 24px 22px; }
.em-cancel { background: none; border: 1px solid var(--rule); color: var(--muted); padding: 9px 18px; border-radius: 6px; cursor: pointer; font-size: 12.5px; font-family: var(--sans); }
.em-send { background: var(--claire); border: none; color: #fff; padding: 9px 22px; border-radius: 6px; cursor: pointer; font-size: 12.5px; font-weight: 600; font-family: var(--sans); }
.em-send:disabled { opacity: 0.5; cursor: default; }

/* ── Page layout ── */
#root { padding: 70px 0 40px; }
.page {
  width: 210mm; min-height: 297mm;
  background: var(--white);
  margin: 0 auto 20px;
  box-shadow: 0 6px 32px rgba(0,0,0,0.18);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ── COVER PAGE ── */
.cover-top-bar {
  background: var(--tmf-blue); padding: 32px 44px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.cover-top-bar .brand-text {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
}
.cover-top-bar .brand-text strong {
  display: block; color: #fff; font-size: 19px; letter-spacing: 0.06em;
  font-weight: 500; margin-top: 3px;
}
.cover-top-bar .brand-logo {
  height: 44px; width: auto; display: block;
  object-fit: contain; filter: invert(1); mix-blend-mode: screen;
}
.cover-fill { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; }
.cover-content {
  display: flex; gap: 32px; padding: 0 44px; align-items: flex-start;
}
.cover-portrait {
  flex-shrink: 0; width: 96px; height: 96px;
  border-radius: 50%; overflow: hidden;
  border: 2px solid var(--tmf-blue);
  box-shadow: 0 8px 28px rgba(0,48,135,0.25);
  background: var(--tmf-blue); display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 34px; font-weight: 600; color: #fff;
}
.cover-right { flex: 1; min-width: 0; }
.cover-tag {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--claire); margin-bottom: 10px;
}
.cover-title {
  font-family: var(--serif); font-size: 36px; font-weight: 500;
  line-height: 1.08; color: var(--tmf-blue); letter-spacing: -0.02em; margin-bottom: 6px;
}
.cover-title2 {
  font-family: var(--serif); font-size: 15.5px; font-style: italic; font-weight: 500;
  color: var(--claire); margin-bottom: 16px;
}
.cover-subtitle {
  font-size: 12.5px; color: var(--muted); line-height: 1.55; margin-bottom: 18px;
}
.cover-pullquote {
  border-left: 3px solid var(--tmf-blue); padding: 12px 16px;
  font-family: var(--serif); font-size: 14px; font-style: italic;
  color: var(--body); line-height: 1.62; background: var(--bg);
  margin-bottom: 8px;
}
.cover-by {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.cover-member-block {
  margin: 0 44px;
  background: var(--tmf-blue); padding: 20px 26px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px;
}
.cover-field label {
  display: block; font-family: var(--mono); font-size: 7px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-bottom: 3px;
}
.cover-field span { font-family: var(--sans); font-size: 12.5px; color: #fff; font-weight: 500; }
.cover-stats { margin: 0 44px; display: flex; }
.cover-stat { flex: 1; text-align: center; padding: 14px 8px; border: 1px solid var(--rule); border-right: none; }
.cover-stat:last-child { border-right: 1px solid var(--rule); }
.cover-stat-n { font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--tmf-blue); line-height: 1; }
.cover-stat-l { font-family: var(--mono); font-size: 7px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-top: 4px; line-height: 1.4; }

/* ── SECTION HEADER (shared) ── */
.sec-header {
  background: linear-gradient(135deg, var(--tmf-blue) 0%, var(--tmf-mid) 100%);
  padding: 26px 44px 20px;
}
.sec-eye { font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.sec-header h2 { font-family: var(--serif); font-size: 26px; font-weight: 500; color: #fff; letter-spacing: -0.01em; }
.sec-header p { font-size: 11.5px; color: rgba(255,255,255,0.75); margin-top: 8px; line-height: 1.6; max-width: 540px; }

/* ── BENEFIT GRID (page 2) ── */
.ben-body { padding: 24px 44px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.ben-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.ben-card { min-height: 230px; border: 1px solid var(--rule); padding: 18px 20px; display: flex; flex-direction: column; }
.ben-card.accent { border-top: 3px solid var(--claire); }
.ben-card.blue { border-top: 3px solid var(--tmf-blue); }
.ben-pain { font-family: var(--mono); font-size: 7px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.ben-head { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--tmf-blue); line-height: 1.22; margin-bottom: 10px; }
.ben-card.accent .ben-head { color: var(--claire); }
.pben-evidence { font-family: var(--serif); font-size: 11px; font-style: italic; color: var(--muted); line-height: 1.5; border-left: 2px solid var(--rule); padding-left: 10px; margin-bottom: 9px; }
.pben-text { font-size: 11px; line-height: 1.58; color: var(--body); }

/* ── CLOSING PAGE (page 3) ── */
.close-body { padding: 26px 44px; flex: 1; display: flex; flex-direction: column; }
.close-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
.close-list li { display: flex; gap: 14px; align-items: flex-start; }
.close-num {
  font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--tmf-blue);
  width: 30px; flex-shrink: 0; line-height: 1.3;
}
.close-txt { font-size: 12px; line-height: 1.6; color: var(--body); padding-top: 2px; }
.close-txt strong { color: var(--ink); }

.final-quote {
  margin-top: auto; background: var(--ink); padding: 30px 36px; position: relative;
}
.final-quote::before { content: '"'; position: absolute; top: -6px; left: 20px; font-family: var(--serif); font-size: 90px; color: rgba(217,18,65,0.35); line-height: 1; }
.final-quote p {
  font-family: var(--serif); font-size: 18px; font-style: italic; font-weight: 500;
  color: #fff; line-height: 1.5; position: relative; z-index: 1;
}
.final-quote p strong { color: var(--claire); font-style: normal; }

.sig-bar { border-top: 1px solid var(--rule); padding-top: 16px; margin-top: 22px; display: flex; align-items: center; gap: 12px; }
.sig-avt { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid var(--tmf-blue); }
.sig-avt img { width: 100%; height: 100%; object-fit: cover; object-position: center 8%; }
.sig-name { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--tmf-blue); }
.sig-title { font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

/* ── Page footer ── */
.pg-footer {
  padding: 9px 44px; border-top: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.pg-footer span { font-family: var(--mono); font-size: 7.5px; letter-spacing: 0.07em; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pg-footer span:first-child { max-width: 70%; }

* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
@media print {
  body { background: white; }
  #actions, #email-modal { display: none !important; }
  #root { padding-top: 0; }
  .page { box-shadow: none; margin: 0; width: 100%; min-height: 0; page-break-after: always; }
  .page:last-child { page-break-after: auto; }
}
</style>
</head>
<body>

<div id="actions">
  <span class="atitle" id="atitle">TM Forum ODA — Benefits Brief</span>
  <div class="abtns">
    <button class="primary" onclick="window.print()">↓ Save as PDF</button>
    <button onclick="openEmailModal()">✉ Email to Recipient</button>
    <button onclick="window.close()">✕ Close</button>
  </div>
</div>

<div id="email-modal">
  <div class="em-panel">
    <div class="em-head">
      <div class="eye">Share This Brief</div>
      <h3>Email to a Recipient</h3>
    </div>
    <div class="em-body">
      <div class="em-status" id="em-status"></div>
      <div class="em-field">
        <label>Recipient email</label>
        <input type="email" id="em-to" placeholder="name@example.com" autocomplete="off">
      </div>
      <div class="em-field">
        <label>Note (optional)</label>
        <textarea id="em-note" placeholder="Add a short personal note…"></textarea>
      </div>
    </div>
    <div class="em-foot">
      <button class="em-cancel" onclick="closeEmailModal()">Cancel</button>
      <button class="em-send" id="em-send-btn" onclick="sendBenefitsEmail()">Send</button>
    </div>
  </div>
</div>

<div id="root">
  <div id="no-data" style="display:none;max-width:460px;margin:80px auto;background:#fff;padding:48px;text-align:center;font-family:'DM Sans',sans-serif;">
    <p style="color:#6B7280;font-size:14px;margin-bottom:24px;">No prospect data found. Please open this from a prospect card on Claire's Stuff.</p>
    <button onclick="window.close()" style="background:#003087;color:#fff;border:none;padding:11px 26px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Close</button>
  </div>
</div>

<script>
const BENEFITS_EMAIL_WH = 'https://n8n.srv1739004.hstgr.cloud/webhook/tmf-prospect-benefits-email';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(name){
  return String(name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0]||''}).join('').toUpperCase();
}

/* ── ODA / TM Forum benefit content bank ─────────────────────────────── */
const BENEFIT_BANK = [
  {id:'an', tag:'Autonomous Networks Mission', title:'Automate with a proven maturity model',
   keywords:['autonomous','self-healing','automation','orchestration','an level','closed-loop','dark noc','network operations','autonomous operations','anlav'],
   benefit:'TM Forum’s Autonomous Networks mission gives your team a proven maturity model (AN Levels 1–5) and real operator case studies for the automation programme already underway — so the roadmap doesn’t have to be built from scratch.'},
  {id:'ai', tag:'AI & Data Mission', title:'Deploy AI on a shared, safe playbook',
   keywords:['ai','genai','agentic','digital twin','data platform','machine learning','ai centre','ai-driven','ai-powered','artificial intelligence'],
   benefit:'The AI & Data mission gives you the industry’s shared playbook for deploying AI safely and effectively in telecom operations — data governance frameworks, maturity assessments, and peer benchmarking against operators solving the same problem.'},
  {id:'oda', tag:'Open APIs & Composable IT Mission', title:'Modernise BSS/OSS without the lock-in',
   keywords:['cloud-native','bss','oss','composable','microservices','api','modernization','modernisation','platform'],
   benefit:'Open APIs and the ODA Component Map turn BSS/OSS modernisation from a bespoke integration project into a standards-based build — cutting vendor lock-in and integration cost for every platform connected from here.'},
  {id:'multiopco', tag:'Multi-OPCO Standardisation', title:'One architecture, every OPCO',
   keywords:['multi-opco','opco','group structure','subsidiaries','countries','regional','pan-african','pan-regional','multi-country'],
   benefit:'For a multi-OPCO group, ODA is the shared architecture language that lets every operating company modernise independently while staying interoperable — avoiding a different bespoke transformation in every market.'},
  {id:'5g', tag:'Network Monetisation Mission', title:'Monetise 5G with a tested pattern',
   keywords:['5g','spectrum','network slicing','enterprise','b2b','monetization','monetisation','rollout'],
   benefit:'Open APIs for B2B monetisation and network slicing are already proven in production by other TM Forum members — a tested go-to-market pattern instead of engineering monetisation infrastructure alone.'},
  {id:'fintech', tag:'Digital Ecosystems', title:'Launch ecosystem products, not rebuilds',
   keywords:['fintech','digital services','marketplace','ecosystem','iot','digibank','fintech ecosystem'],
   benefit:'As the group expands into fintech and adjacent digital services, ODA’s composable architecture and Open API catalogue support launching new ecosystem products without re-architecting the core stack each time.'},
  {id:'leadership', tag:'Leadership Alignment', title:'Give new leadership an instant framework',
   keywords:['appointment','cto','ctio','chief','executive','leadership','c-suite','group cto'],
   benefit:'New technology leadership is exactly the moment transformation programmes gain internal sponsorship — TM Forum gives new leadership a credible, peer-validated framework to rally the organisation around from day one.'},
  {id:'catalyst', tag:'Catalyst & Innovation Mission', title:'Share the cost of innovation',
   keywords:['partnership','innovation','hackathon','co-create','pilot','mwc','showcase','proof of concept','poc'],
   benefit:'TM Forum’s Catalyst programme turns innovation initiatives into co-funded, peer-validated projects — sharing R&D cost and risk with other operators tackling the same challenges.'}
];
const FALLBACK_BENEFIT = {tag:'Peer Benchmarking & Community', title:'See how your peers are solving this',
  benefit:'Membership gives direct visibility into how comparable operators are solving the same modernisation challenges — benchmarked data and peer relationships not available anywhere else.'};

function correlateBenefits(text, signalsList){
  var lower=text.toLowerCase();
  var scored=BENEFIT_BANK.map(function(b){
    var hits=b.keywords.filter(function(k){return lower.indexOf(k)!==-1}).length;
    var evidence=null;
    for(var i=0;i<signalsList.length;i++){
      var sl=signalsList[i].toLowerCase();
      if(b.keywords.some(function(k){return sl.indexOf(k)!==-1})){evidence=signalsList[i];break;}
    }
    return {tag:b.tag, title:b.title, benefit:b.benefit, score:hits, evidence:evidence};
  });
  scored.sort(function(a,b){return b.score-a.score});
  var picked=scored.slice(0,4);
  var matchedCount=picked.filter(function(p){return p.score>0}).length;
  if(matchedCount<3){
    picked[3]=Object.assign({score:0,evidence:null},FALLBACK_BENEFIT);
  }
  return picked;
}

/* ── Load prospect data ──────────────────────────────────────────────── */
const D = (function(){
  try { return JSON.parse(localStorage.getItem('tmf-prospect-benefits-data')); } catch(e){ return null; }
})();

if(!D || !D['Company']){
  document.getElementById('no-data').style.display='block';
} else {
  buildDoc();
}

function buildDoc(){
  var company=D['Company']||'This Prospect';
  var hq=D['HQ']||'';
  var score=parseFloat(D['Score'])||0;
  var verdict=(D['Verdict']||'Unrated').trim();
  var mission=D['Primary Mission']||D['Primay Mission']||'';
  var summary=D['Summary']||'';
  var timing=D['Timing Hook']||'';
  var status=D['Status']||'New';
  var signalsList=(D['Top Signals']||'').split(',').map(function(s){return s.trim()}).filter(Boolean);
  var contacts=(D['Key Contacts']||'').split(';').map(function(s){return s.trim()}).filter(Boolean);
  var firstContact=contacts.length?contacts[0].split('—')[0].trim():'';

  document.title='TM Forum ODA — Benefits Brief for '+company;
  document.getElementById('atitle').textContent='TM Forum ODA — Benefits Brief · '+company;

  var combinedText=[summary,D['Top Signals'],timing,mission,D['Research Notes']].filter(Boolean).join(' ');
  var picked=correlateBenefits(combinedText,signalsList);
  var matchedCount=picked.filter(function(p){return p.score>0}).length;

  var pullquote=timing||('TM Forum’s Open Digital Architecture gives '+company+' a proven, standards-based path through its next phase of network and BSS/OSS transformation.');

  var cardClasses=['accent','blue','blue','accent'];
  var benCards=picked.map(function(p,i){
    return '<div class="ben-card '+cardClasses[i]+'">'+
      '<div class="ben-pain">TM Forum &middot; '+esc(p.tag)+'</div>'+
      '<div class="ben-head">'+esc(p.title)+'</div>'+
      (p.evidence?'<div class="pben-evidence">“'+esc(p.evidence)+'”</div>':'')+
      '<div class="pben-text">'+esc(p.benefit)+'</div>'+
    '</div>';
  }).join('');

  var topTagLower=(picked[0]&&picked[0].score>0)?picked[0].tag.replace(' Mission','').toLowerCase():'digital transformation';
  var closingQuote='<strong>'+esc(company)+'</strong> is already moving on '+esc(topTagLower)+'. The only question is whether that transformation happens alone, or alongside <strong>50+ operators and vendors</strong> who’ve already solved pieces of the same problem — that’s what TM Forum membership, and ODA, are built for.';

  var html = ''+
  '<div class="page">'+
    '<div class="cover-top-bar">'+
      '<div class="brand-text">TM Forum<strong>ODA Benefits Brief</strong></div>'+
      '<img class="brand-logo" src="images/TMForum logo.png" alt="TM Forum">'+
    '</div>'+
    '<div class="cover-fill">'+
    '<div class="cover-content">'+
      '<div class="cover-portrait">'+esc(initials(company))+'</div>'+
      '<div class="cover-right">'+
        '<div class="cover-tag">Prepared Exclusively For</div>'+
        '<div class="cover-title">'+esc(company)+'</div>'+
        (hq?'<div class="cover-title2">'+esc(hq)+'</div>':'')+
        '<div class="cover-subtitle">A short brief on why TM Forum’s Open Digital Architecture is directly relevant to '+esc(company)+'’s modernisation journey — built from Claire’s own research on your organisation.</div>'+
        '<div class="cover-pullquote">&ldquo;'+esc(pullquote)+'&rdquo;</div>'+
        '<div class="cover-by">Claire Watson &middot; Engagement Manager &middot; TM Forum</div>'+
      '</div>'+
    '</div>'+
    '<div class="cover-member-block">'+
      '<div class="cover-field"><label>Prepared for</label><span>'+esc(company)+'</span></div>'+
      '<div class="cover-field"><label>Contact</label><span>'+esc(firstContact||'Prospect Account')+'</span></div>'+
      '<div class="cover-field"><label>Subject</label><span>TM Forum ODA Membership Benefits</span></div>'+

/* ── Email modal ──────────────────────────────────────────────────────── */
function openEmailModal() {
  if(!window._benefitsEmailData){ return; }
  document.getElementById('email-modal').classList.add('open');
  document.getElementById('em-status').className = 'em-status';
  document.getElementById('em-status').textContent = '';
  setTimeout(() => document.getElementById('em-to').focus(), 50);
}
function closeEmailModal() {
  document.getElementById('email-modal').classList.remove('open');
}
document.getElementById('email-modal').addEventListener('click', (e) => {
  if (e.target.id === 'email-modal') closeEmailModal();
});

function buildEmailHtml(data, note){
  var cardsHtml = data.picked.map(function(p){
    return '<div style="margin-bottom:18px;padding-left:14px;border-left:3px solid #003087;">'+
      '<p style="margin:0 0 4px;font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#6B7280;">TM Forum &middot; '+esc(p.tag)+'</p>'+
      '<p style="margin:0 0 6px;font-size:15px;font-weight:600;color:#003087;">'+esc(p.title)+'</p>'+
      (p.evidence?'<p style="margin:0 0 6px;font-size:12.5px;font-style:italic;color:#6B7280;">“'+esc(p.evidence)+'”</p>':'')+
      '<p style="margin:0;font-size:13px;line-height:1.6;color:#2C3148;">'+esc(p.benefit)+'</p>'+
    '</div>';
  }).join('');
  return '<div style="font-family:\'Segoe UI\',Arial,sans-serif;max-width:600px;margin:0 auto;background:#003087;color:#ffffff;border-radius:8px;overflow:hidden;">'+
    '<div style="padding:32px 40px;"><p style="margin:0;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);">TM Forum &middot; Open Digital Architecture</p>'+
    '<h1 style="margin:10px 0 0;font-size:23px;font-weight:600;">Benefits Brief for '+esc(data.company)+'</h1></div>'+
    '<div style="background:#ffffff;color:#2C3148;padding:32px 36px;">'+
    (note?'<p style="font-size:14px;line-height:1.7;margin:0 0 22px;">'+esc(note)+'</p>':'')+
    '<p style="font-size:13px;line-height:1.7;margin:0 0 24px;color:#6B7280;font-style:italic;">“'+esc(data.pullquote)+'”</p>'+
    cardsHtml+
    '<p style="font-size:14px;line-height:1.7;margin:24px 0 0;">'+data.closingQuote+'</p>'+
    '<p style="font-size:12px;color:#6B7280;line-height:1.6;margin-top:26px;">Prepared by <strong>Claire Watson</strong>, Engagement Manager, TM Forum.</p>'+
    '</div></div>';
}

async function sendBenefitsEmail() {
  const to = document.getElementById('em-to').value.trim();
  const note = document.getElementById('em-note').value.trim();
  const status = document.getElementById('em-status');
  const btn = document.getElementById('em-send-btn');
  if (!to || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
    status.className = 'em-status err';
    status.textContent = 'Please enter a valid email address.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending…';
  status.className = 'em-status';
  status.textContent = '';
  try {
    const data = window._benefitsEmailData;
    const emailHtml = buildEmailHtml(data, note);
    const resp = await fetch(BENEFITS_EMAIL_WH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, company: data.company, emailHtml, preparedBy: 'Claire Watson' })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    status.className = 'em-status ok';
    status.textContent = '✓ Sent to ' + to;
    document.getElementById('em-to').value = '';
    document.getElementById('em-note').value = '';
    setTimeout(closeEmailModal, 1800);
  } catch (e) {
    status.className = 'em-status err';
    status.textContent = 'Send failed — please try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}
</script>
